name: Publish Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Resolve version
        id: release
        shell: bash
        run: |
          REF_NAME="${{ github.ref_name }}"
          VERSION="${REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid browser extension version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        run: npm run check:versions -- ${{ steps.release.outputs.version }}

      - name: Run checks
        run: npm run check

      - name: Generate release notes
        run: npm run release:notes -- ${{ steps.release.outputs.version }}

      - name: Package Chromium extension
        run: npm run extension:chromium:package

      - name: Download published Firefox extension
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          AMO_METADATA_FILE="$(mktemp)"
          AMO_FIELDS_FILE="$(mktemp)"
          trap 'rm -f "$AMO_METADATA_FILE" "$AMO_FIELDS_FILE"' EXIT
          AMO_API_URL="https://addons.mozilla.org/api/v5/addons/addon/patina-web-sync/versions/v${VERSION}/"
          curl --fail --silent --show-error --location "$AMO_API_URL" --output "$AMO_METADATA_FILE"

          node --input-type=module - "$AMO_METADATA_FILE" "$VERSION" > "$AMO_FIELDS_FILE" <<'NODE'
          import { readFileSync } from "node:fs";

          const [metadataFile, expectedVersion] = process.argv.slice(2);
          const metadata = JSON.parse(readFileSync(metadataFile, "utf8"));
          const downloadUrl = metadata.file?.url;
          const hash = metadata.file?.hash;

          if (metadata.version !== expectedVersion) {
            throw new Error(`AMO returned version ${metadata.version ?? "(missing)"}; expected ${expectedVersion}.`);
          }
          if (metadata.channel !== "listed" || metadata.file?.status !== "public") {
            throw new Error("The requested Firefox version is not a public listed AMO release.");
          }
          if (!/^https:\/\/addons\.mozilla\.org\/firefox\/downloads\/file\/\d+\/[A-Za-z0-9._+-]+\.xpi$/.test(downloadUrl ?? "")) {
            throw new Error("AMO returned an unexpected Firefox download URL.");
          }
          if (!/^sha256:[0-9a-f]{64}$/i.test(hash ?? "")) {
            throw new Error("AMO returned an invalid SHA-256 hash.");
          }

          console.log(downloadUrl);
          console.log(hash.slice("sha256:".length).toLowerCase());
          NODE
          mapfile -t AMO_FIELDS < "$AMO_FIELDS_FILE"

          DOWNLOAD_URL="${AMO_FIELDS[0]}"
          EXPECTED_SHA256="${AMO_FIELDS[1]}"
          FIREFOX_XPI="dist/extensions/firefox/patina-firefox-extension-v${VERSION}.xpi"
          mkdir -p "$(dirname "$FIREFOX_XPI")"
          curl --fail --silent --show-error --location "$DOWNLOAD_URL" --output "$FIREFOX_XPI"
          echo "${EXPECTED_SHA256}  ${FIREFOX_XPI}" | sha256sum --check --strict

          FIREFOX_MANIFEST="$(unzip -p "$FIREFOX_XPI" manifest.json)"
          FIREFOX_MANIFEST="$FIREFOX_MANIFEST" node --input-type=module - "$VERSION" <<'NODE'
          const expectedVersion = process.argv[2];
          const manifest = JSON.parse(process.env.FIREFOX_MANIFEST ?? "");
          if (manifest.version !== expectedVersion) {
            throw new Error(`Signed XPI manifest version ${manifest.version ?? "(missing)"}; expected ${expectedVersion}.`);
          }
          if (manifest.browser_specific_settings?.gecko?.id !== "web-sync@patina.local") {
            throw new Error("Signed XPI Gecko ID does not match Patina Web Sync.");
          }
          NODE

      - name: Collect assets
        shell: bash
        run: |
          mkdir -p dist-release
          CHROMIUM_VERSION=$(node -p "require('./src/chromium/manifest.json').version")
          FIREFOX_VERSION=$(node -p "require('./src/firefox/manifest.json').version")
          cp "dist/extensions/chromium/patina-chromium-extension-v${CHROMIUM_VERSION}.zip" dist-release/
          cp "dist/extensions/firefox/patina-firefox-extension-v${FIREFOX_VERSION}.xpi" dist-release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.release.outputs.version }}
          name: Patina Web Sync v${{ steps.release.outputs.version }}
          prerelease: false
          body_path: dist/release-notes.md
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist-release/patina-chromium-extension-v${{ steps.release.outputs.version }}.zip
            dist-release/patina-firefox-extension-v${{ steps.release.outputs.version }}.xpi
