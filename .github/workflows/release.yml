name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Existing version tag to publish, without leading v, for example 0.1.1"
        required: true
        type: string
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}

      - name: Resolve version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            REF_NAME="${{ github.ref_name }}"
            VERSION="${REF_NAME#v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid browser extension version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: existing_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${VERSION} already exists. Skipping publish to avoid re-signing the same Firefox version."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.existing_release.outputs.exists != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.existing_release.outputs.exists != 'true'
        run: npm ci

      - name: Validate release version
        if: steps.existing_release.outputs.exists != 'true'
        run: npm run check:versions -- ${{ steps.release.outputs.version }}

      - name: Run checks
        if: steps.existing_release.outputs.exists != 'true'
        run: npm run check

      - name: Package Chromium extension
        if: steps.existing_release.outputs.exists != 'true'
        run: npm run extension:chromium:package

      - name: Sign Firefox extension
        if: steps.existing_release.outputs.exists != 'true'
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: npm run extension:firefox:sign

      - name: Collect assets
        if: steps.existing_release.outputs.exists != 'true'
        shell: bash
        run: |
          mkdir -p dist-release
          CHROMIUM_VERSION=$(node -p "require('./src/chromium/manifest.json').version")
          FIREFOX_VERSION=$(node -p "require('./src/firefox/manifest.json').version")
          cp "dist/extensions/chromium/patina-chromium-extension-v${CHROMIUM_VERSION}.zip" dist-release/
          cp "dist/extensions/firefox/patina-firefox-extension-v${FIREFOX_VERSION}.xpi" dist-release/

      - name: Publish GitHub Release
        if: steps.existing_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.release.outputs.version }}
          name: Patina Web Sync v${{ steps.release.outputs.version }}
          draft: false
          prerelease: false
          files: dist-release/*
