name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Existing version tag to publish, for example 0.1.1"
        required: true
        type: string
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Resolve version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            REF_NAME="${{ github.ref_name }}"
            VERSION="${REF_NAME#v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Package Chromium extension
        run: npm run extension:chromium:package

      - name: Sign Firefox extension
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: npm run extension:firefox:sign

      - name: Collect assets
        shell: bash
        run: |
          mkdir -p dist-release
          CHROMIUM_VERSION=$(node -p "require('./src/chromium/manifest.json').version")
          FIREFOX_VERSION=$(node -p "require('./src/firefox/manifest.json').version")
          cp "dist/extensions/chromium/patina-chromium-extension-v${CHROMIUM_VERSION}.zip" dist-release/
          cp "dist/extensions/firefox/patina-firefox-extension-v${FIREFOX_VERSION}.xpi" dist-release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.release.outputs.version }}
          name: Patina Web Sync v${{ steps.release.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.release.outputs.version, '-') }}
          files: dist-release/*
